<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
  <meta name="description" content="ManMoon - Video Learning Content">
  <meta name="author" content="ManMoon">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Videos - ManMoon Learning Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #F0FDF4;
      color: #052E16;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #052E16;
      color: #F0FDF4;
    }
    .top-nav {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    .back-link {
      color: #14532D;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
    }
    body.dark .back-link {
      color: #4ADE80;
    }
    .theme-toggle {
      background: #14532D;
      color: #FFFFFF;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    body.dark .theme-toggle {
      background: #4ADE80;
      color: #052E16;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #14532D;
      margin-bottom: 30px;
      text-align: center;
    }
    body.dark h1 {
      color: #4ADE80;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    .video-card {
      background: #FFFFFF;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: transform 0.2s;
    }
    body.dark .video-card {
      background: #14532D;
    }
    .video-card:hover {
      transform: translateY(-4px);
    }
    .video-thumbnail {
      width: 100%;
      height: 200px;
      background: #14532D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    body.dark .video-thumbnail {
      background: #052E16;
    }
    .video-title {
      padding: 16px;
      color: #14532D;
      font-weight: 600;
      text-align: center;
    }
    body.dark .video-title {
      color: #4ADE80;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: #FFFFFF;
      border-radius: 12px;
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    body.dark .modal-content {
      background: #14532D;
    }
    .close-modal {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #14532D;
      color: #FFFFFF;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      z-index: 2001;
    }
    body.dark .close-modal {
      background: #4ADE80;
      color: #052E16;
    }
    .video-player {
      width: 100%;
      padding-top: 56.25%;
      position: relative;
      background: #000;
    }
    .video-player iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-info {
      padding: 24px;
      color: #052E16;
    }
    body.dark .video-info {
      color: #F0FDF4;
    }
    .video-info h2 {
      color: #14532D;
      margin-bottom: 12px;
    }
    body.dark .video-info h2 {
      color: #4ADE80;
    }
    @media (max-width: 768px) {
      .video-grid {
        grid-template-columns: 1fr;
      }
      .modal-content {
        max-height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <a href="index.html" class="back-link">← Back to Home</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div class="container">
    <h1>📚 Learning Videos</h1>
    
    <div class="video-grid">
      <div class="video-card" onclick="openVideo(0)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-title">Getting Started</div>
      </div>
      <div class="video-card" onclick="openVideo(1)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-title">Lesson 1</div>
      </div>
      <div class="video-card" onclick="openVideo(2)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-title">Lesson 2</div>
      </div>
      <div class="video-card" onclick="openVideo(3)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-title">Lesson 3</div>
      </div>
      <div class="video-card" onclick="openVideo(4)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-title">Lesson 4</div>
      </div>
      <div class="video-card" onclick="openVideo(5)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-title">Lesson 5</div>
      </div>
    </div>
  </div>

  <div class="modal" id="videoModal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeVideo()">✕</button>
      <div class="video-player" id="videoPlayer"></div>
      <div class="video-info">
        <h2 id="videoTitle">Video Title</h2>
        <p id="videoDesc">Watch this video to learn more.</p>
      </div>
    </div>
  </div>

  <script>
    const videos = [
      {
        url: 'https://rumble.com/embed/v742fmc/?pub=4ou89i',
        title: 'Getting Started',
        desc: 'Introduction to ManMoon learning platform'
      },
      {
        url: 'https://rumble.com/embed/v74979e/?pub=4ou89i',
        title: 'Lesson 1',
        desc: 'First lesson content'
      },
      {
        url: 'https://rumble.com/embed/v7461nq/?pub=4ou89i',
        title: 'Lesson 2',
        desc: 'Second lesson content'
      },
      {
        url: 'https://rumble.com/embed/v7461o4/?pub=4ou89i',
        title: 'Lesson 3',
        desc: 'Third lesson content'
      },
      {
        url: 'https://rumble.com/embed/v7461se/?pub=4ou89i',
        title: 'Lesson 4',
        desc: 'Fourth lesson content'
      },
      {
        url: 'https://rumble.com/embed/v7461s6/?pub=4ou89i',
        title: 'Lesson 5',
        desc: 'Fifth lesson content'
      }
    ];

    function openVideo(index) {
      const video = videos[index];
      document.getElementById('videoPlayer').innerHTML = `<iframe src="${video.url}" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups"></iframe>`;
      document.getElementById('videoTitle').textContent = video.title;
      document.getElementById('videoDesc').textContent = video.desc;
      document.getElementById('videoModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeVideo() {
      document.getElementById('videoModal').classList.remove('show');
      document.getElementById('videoPlayer').innerHTML = '';
      document.body.style.overflow = 'auto';
    }

    document.getElementById('videoModal').addEventListener('click', (e) => {
      if (e.target.id === 'videoModal') closeVideo();
    });

    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
